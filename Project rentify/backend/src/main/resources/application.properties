spring.application.name=rentify
# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/rentify_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB
file.upload-dir=./uploads/images

# Session Cookies
server.servlet.session.cookie.http-only=true
# server.servlet.session.cookie.secure=true
# server.servlet.session.cookie.same-site=Strict

# Springdoc OpenAPI (Swagger)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.rentify.controller
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=alpha

# Logging
logging.level.com.rentify=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG